name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "AnnotSV.def"
      - ".github/workflows/build-containers.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Must be lowercase for OCI compliance (Apptainer rejects mixed-case)
  IMAGE_NAME: kchennen/annotsv

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build and push Docker image to GHCR
  # ──────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      annotsv-version: ${{ steps.version.outputs.annotsv_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract AnnotSV version from Dockerfile
        id: version
        run: |
          ANNOTSV_VERSION=$(grep 'ARG ANNOTSV_VERSION=' Dockerfile | cut -d= -f2 | sed 's/^v//')
          echo "annotsv_version=${ANNOTSV_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.annotsv_version }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 2: Build Singularity image from Docker
  # ──────────────────────────────────────────────
  singularity:
    runs-on: ubuntu-latest
    needs: docker
    # eWaterCycle/setup-apptainer@v2 has no Node.js 24 release yet
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANNOTSV_VERSION: ${{ needs.docker.outputs.annotsv-version }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Log in to GHCR for Apptainer
        run: echo "${{ secrets.GITHUB_TOKEN }}" | apptainer remote login --username "${{ github.actor }}" --password-stdin "oras://ghcr.io"

      - name: Build Singularity image from Docker image
        run: |
          apptainer build annotsv_${{ env.ANNOTSV_VERSION }}.sif \
            "docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.ANNOTSV_VERSION }}"

      - name: Upload SIF as artifact
        uses: actions/upload-artifact@v7
        with:
          name: annotsv-${{ env.ANNOTSV_VERSION }}-singularity
          path: annotsv_${{ env.ANNOTSV_VERSION }}.sif
          retention-days: 90

      - name: Create GitHub Release and attach SIF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.ANNOTSV_VERSION }}
          name: AnnotSV ${{ env.ANNOTSV_VERSION }}
          body: |
            Docker image: `ghcr.io/kchennen/annotsv:${{ env.ANNOTSV_VERSION }}`

            Pull the Singularity image:
            ```bash
            singularity pull annotsv_${{ env.ANNOTSV_VERSION }}.sif docker://ghcr.io/kchennen/annotsv:${{ env.ANNOTSV_VERSION }}
            ```
          files: annotsv_${{ env.ANNOTSV_VERSION }}.sif
